name: Build Lumina

on:
  push:
    tags:
      - 'v*'          # dispara ao criar uma tag tipo v1.0.0
  workflow_dispatch:  # permite rodar manualmente pelo site do GitHub

jobs:

  # ── WINDOWS ──────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Windows (.exe)
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload .exe
        uses: actions/upload-artifact@v4
        with:
          name: lumina-windows
          path: dist/*.exe

  # ── MACOS ─────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build macOS (.dmg)
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: lumina-mac
          path: dist/*.dmg

  # ── LINUX ─────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Linux (.AppImage + .deb)
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux builds
        uses: actions/upload-artifact@v4
        with:
          name: lumina-linux
          path: |
            dist/*.AppImage
            dist/*.deb

  # ── RELEASE AUTOMÁTICO (junta os 3 num release do GitHub) ────────────
  release:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lumina-windows/*.exe
            lumina-mac/*.dmg
            lumina-linux/*.AppImage
            lumina-linux/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
