<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width:420px; height:280px;
    background: transparent;
    font-family: 'Consolas', monospace;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .card {
    width: 100%; height: 100%;
    background: rgba(3,5,15,0.97);
    border: 1px solid rgba(0,191,255,0.3);
    border-radius: 18px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px;
    box-shadow: 0 0 60px rgba(0,191,255,0.15);
    position: relative;
    overflow: hidden;
  }
  canvas { position:absolute; inset:0; pointer-events:none; }
  .logo { font-size: 46px; font-weight: bold; letter-spacing: 10px; position:relative; z-index:1; }
  .logo .l { color: #00BFFF; text-shadow: 0 0 30px #00BFFF, 0 0 60px rgba(0,191,255,0.3); }
  .logo .rest { color: #2a4a6a; }
  .sub { font-size: 10px; color: #1a3a5a; letter-spacing: 4px; position:relative; z-index:1; }
  .bar-wrap { width: 200px; height: 3px; background: rgba(0,191,255,0.1); border-radius: 2px; position:relative; z-index:1; }
  .bar { height: 100%; background: #00BFFF; border-radius: 2px; width: 0%; box-shadow: 0 0 10px #00BFFF; transition: width 0.1s; }
  .status { font-size: 9px; color: #1a3a5a; letter-spacing: 2px; position:relative; z-index:1; }
  .version { position:absolute; bottom:14px; right:16px; font-size:9px; color:#0a2a3a; z-index:1; }
</style>
</head>
<body>
<div class="card">
  <canvas id="c"></canvas>
  <div class="logo"><span class="l">L</span><span class="rest">UMINA</span></div>
  <div class="sub">INTELLIGENT BROWSER</div>
  <div class="bar-wrap"><div class="bar" id="bar"></div></div>
  <div class="status" id="status">INICIANDO SISTEMAS...</div>
  <div class="version">v1.0.0</div>
</div>
<script>
  const c = document.getElementById('c')
  c.width = 420; c.height = 280
  const ctx = c.getContext('2d')
  const stars = Array.from({length:60}, () => ({
    x: Math.random()*420, y: Math.random()*280,
    r: Math.random()*1.2+0.2, op: Math.random()*0.4+0.05,
    tw: Math.random()*Math.PI*2, tws: Math.random()*0.03+0.01
  }))
  function drawStars() {
    ctx.clearRect(0,0,420,280)
    stars.forEach(s => {
      s.tw += s.tws
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2)
      ctx.fillStyle = `rgba(180,210,255,${s.op*(0.5+0.5*Math.sin(s.tw))})`
      ctx.fill()
    })
    requestAnimationFrame(drawStars)
  }
  drawStars()

  const bar    = document.getElementById('bar')
  const status = document.getElementById('status')
  const steps  = [
    [15,  'CARREGANDO INTERFACE...'],
    [35,  'INICIANDO BACKEND...'],
    [55,  'CONECTANDO IA...'],
    [75,  'CARREGANDO MÓDULOS...'],
    [90,  'QUASE LÁ...'],
    [100, 'BEM-VINDO À LUMINA'],
  ]
  let i = 0
  function next() {
    if (i >= steps.length) return
    const [pct, msg] = steps[i++]
    bar.style.width = pct + '%'
    status.textContent = msg
    if (i < steps.length) setTimeout(next, 350)
  }
  setTimeout(next, 200)
</script>
</body>
</html>
