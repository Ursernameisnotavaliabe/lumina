<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>LUMINA — Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--accent:#00BFFF;--bg:#03050f;--glass:rgba(8,16,32,0.85);--text:#c8d8e8;--text-dim:#4a6a8a;--font:'Consolas','Courier New',monospace}
html,body{width:100%;height:100%;background:var(--bg);font-family:var(--font);overflow:hidden;user-select:none}
canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.titlebar{height:36px;background:rgba(3,5,15,0.95);-webkit-app-region:drag;display:flex;align-items:center;justify-content:space-between;padding:0 12px;position:relative;z-index:10;border-bottom:1px solid rgba(0,191,255,0.1)}
.titlebar-left{font-size:11px;font-weight:bold;letter-spacing:3px;-webkit-app-region:no-drag}
.titlebar-left .l{color:var(--accent)}
.titlebar-left .r{color:#1a3a5a}
.titlebar-right{display:flex;gap:4px;-webkit-app-region:no-drag}
.win-btn{background:none;border:none;color:#2a4a6a;cursor:pointer;width:28px;height:24px;border-radius:4px;font-size:11px;transition:all 0.15s}
.win-btn:hover{background:rgba(255,255,255,0.08);color:var(--text)}
#btn-close:hover{background:#ff4455;color:#fff}
.container{position:relative;z-index:1;height:calc(100vh - 36px);display:flex;align-items:center;justify-content:center}
.card{width:380px;background:var(--glass);backdrop-filter:blur(24px);border:1px solid rgba(0,191,255,0.2);border-radius:20px;padding:32px;display:flex;flex-direction:column;align-items:center;gap:20px;box-shadow:0 20px 60px rgba(0,0,0,0.6),0 0 40px rgba(0,191,255,0.05)}
.logo{font-size:36px;font-weight:bold;letter-spacing:8px}
.logo .l{color:var(--accent);text-shadow:0 0 20px var(--accent)}
.logo .r{color:#1a3a5a}
.subtitle{font-size:9px;color:var(--text-dim);letter-spacing:4px;text-align:center;margin-top:-12px}

/* LANG SELECTOR */
.lang-selector{display:flex;gap:8px;background:rgba(10,21,37,0.6);border:1px solid rgba(0,191,255,0.1);border-radius:10px;padding:4px}
.lang-btn{background:none;border:none;color:var(--text-dim);font-family:var(--font);font-size:11px;cursor:pointer;padding:6px 14px;border-radius:7px;transition:all 0.15s;display:flex;align-items:center;gap:6px}
.lang-btn.active{background:var(--accent);color:#000;font-weight:bold}
.lang-btn:not(.active):hover{background:rgba(0,191,255,0.08);color:var(--text)}

.divider{width:100%;height:1px;background:rgba(0,191,255,0.1)}
.login-title{font-size:11px;color:var(--text-dim);letter-spacing:2px}
.btn-oauth{width:100%;padding:14px;border-radius:12px;border:1px solid rgba(0,191,255,0.15);background:rgba(255,255,255,0.03);color:var(--text);font-family:var(--font);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;transition:all 0.2s}
.btn-oauth:hover{background:rgba(0,191,255,0.08);border-color:rgba(0,191,255,0.3);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.3)}
.btn-google{border-color:rgba(234,67,53,0.2)}
.btn-google:hover{background:rgba(234,67,53,0.06);border-color:rgba(234,67,53,0.3)}
.btn-discord{border-color:rgba(88,101,242,0.2)}
.btn-discord:hover{background:rgba(88,101,242,0.06);border-color:rgba(88,101,242,0.3)}
.btn-icon{font-size:18px}
.status{font-size:10px;color:var(--text-dim);text-align:center;min-height:16px}
.status.error{color:#ff4455}
.status.loading{color:var(--accent);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}
.footer{font-size:9px;color:#0a2a3a;text-align:center;line-height:1.8}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="titlebar">
  <div class="titlebar-left"><span class="l">L</span><span class="r">UMINA</span></div>
  <div class="titlebar-right">
    <button class="win-btn" id="btn-min">─</button>
    <button class="win-btn" id="btn-close">✕</button>
  </div>
</div>
<div class="container">
  <div class="card">
    <div class="logo"><span class="l">L</span><span class="r">UMINA</span></div>
    <div class="subtitle" id="sub">INTELLIGENT BROWSER</div>

    <!-- SELETOR DE IDIOMA -->
    <div class="lang-selector">
      <button class="lang-btn active" id="lang-pt" onclick="setLang('pt')">🇧🇷 Português</button>
      <button class="lang-btn" id="lang-en" onclick="setLang('en')">🇺🇸 English</button>
    </div>

    <div class="divider"></div>
    <div class="login-title" id="login-title">ENTRAR NA SUA CONTA</div>

    <button class="btn-oauth btn-google" id="btn-google">
      <span class="btn-icon">🔵</span>
      <span id="txt-google">Continuar com Google</span>
    </button>
    <button class="btn-oauth btn-discord" id="btn-discord">
      <span class="btn-icon">💬</span>
      <span id="txt-discord">Continuar com Discord</span>
    </button>

    <div class="status" id="status"></div>
    <div class="divider"></div>
    <div class="footer" id="footer">
      Ao entrar, você concorda com os termos de uso.<br>
      Seus dados são armazenados com segurança.
    </div>
  </div>
</div>
<script>
const { ipcRenderer } = require('electron')
const fs   = require('fs')
const path = require('path')
const os   = require('os')

// ── STARS ────────────────────────────────────────────────────────────────────
const c=document.getElementById('c'),ctx=c.getContext('2d')
c.width=window.innerWidth;c.height=window.innerHeight
const stars=Array.from({length:120},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.3+0.2,op:Math.random()*0.5+0.05,tw:Math.random()*Math.PI*2,tws:Math.random()*0.02+0.005}))
function draw(){ctx.clearRect(0,0,c.width,c.height);stars.forEach(s=>{s.tw+=s.tws;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(180,210,255,${s.op*(0.4+0.6*Math.sin(s.tw))})`;ctx.fill()});requestAnimationFrame(draw)}
draw()

// ── I18N ─────────────────────────────────────────────────────────────────────
const i18n = {
  pt: {
    title:   'ENTRAR NA SUA CONTA',
    google:  'Continuar com Google',
    discord: 'Continuar com Discord',
    footer:  'Ao entrar, você concorda com os termos de uso.\nSeus dados são armazenados com segurança.',
    loading_google:  'Conectando com Google...',
    loading_discord: 'Conectando com Discord...',
    verifying: 'Verificando conta...',
  },
  en: {
    title:   'SIGN IN TO YOUR ACCOUNT',
    google:  'Continue with Google',
    discord: 'Continue with Discord',
    footer:  'By signing in, you agree to the terms of use.\nYour data is stored securely.',
    loading_google:  'Connecting with Google...',
    loading_discord: 'Connecting with Discord...',
    verifying: 'Verifying account...',
  }
}

let lang = 'pt'

// Carrega idioma salvo
try {
  const cfgPath = path.join(os.homedir(), '.lumina', 'config.json')
  if(fs.existsSync(cfgPath)) {
    const cfg = JSON.parse(fs.readFileSync(cfgPath,'utf8'))
    if(cfg.lang) lang = cfg.lang
  }
} catch(e) {}

function setLang(l) {
  lang = l
  // Salva preferência
  try {
    const cfgPath = path.join(os.homedir(), '.lumina', 'config.json')
    const dir = path.dirname(cfgPath)
    if(!fs.existsSync(dir)) fs.mkdirSync(dir,{recursive:true})
    let cfg = {}
    if(fs.existsSync(cfgPath)) cfg = JSON.parse(fs.readFileSync(cfgPath,'utf8'))
    cfg.lang = l
    fs.writeFileSync(cfgPath, JSON.stringify(cfg,null,2))
  } catch(e) {}

  document.getElementById('lang-pt').classList.toggle('active', l==='pt')
  document.getElementById('lang-en').classList.toggle('active', l==='en')
  document.getElementById('login-title').textContent = i18n[l].title
  document.getElementById('txt-google').textContent  = i18n[l].google
  document.getElementById('txt-discord').textContent = i18n[l].discord
  document.getElementById('footer').innerHTML = i18n[l].footer.replace('\n','<br>')
  document.documentElement.lang = l
}

setLang(lang)

// ── WINDOW ───────────────────────────────────────────────────────────────────
document.getElementById('btn-min').onclick   = () => ipcRenderer.send('minimize')
document.getElementById('btn-close').onclick = () => ipcRenderer.send('close')

const status = document.getElementById('status')

document.getElementById('btn-google').onclick = () => {
  status.className='status loading'
  status.textContent = i18n[lang].loading_google
  ipcRenderer.send('oauth-login', 'google')
}
document.getElementById('btn-discord').onclick = () => {
  status.className='status loading'
  status.textContent = i18n[lang].loading_discord
  ipcRenderer.send('oauth-login', 'discord')
}

ipcRenderer.on('oauth-error',  (e,msg) => { status.className='status error';   status.textContent=msg||'Erro ao fazer login.' })
ipcRenderer.on('oauth-status', (e,msg) => { status.className='status loading'; status.textContent=i18n[lang].verifying })
</script>
</body>
</html>
